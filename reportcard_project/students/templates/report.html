<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Report Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen">

    <div class="bg-white border-2 border-gray-200 p-10 rounded-2xl shadow-lg text-center max-w-sm w-full">
        <h1 class="text-3xl font-extrabold text-gray-900 mb-2">OFFICIAL REPORT</h1>
        <div class="h-1 w-20 bg-blue-500 mx-auto mb-6"></div>

        <div class="text-left space-y-4 text-lg">
            <p><span class="text-gray-500">Name:</span> <span class="font-bold uppercase">{{ student.name }}</span></p>
            <p><span class="text-gray-500">Age Group:</span> <span class="font-medium">{{ student.age_group }}</span></p>
            <p><span class="text-gray-500">Total Marks:</span> <span class="font-medium">{{ student.marks }} / 700</span></p>
            
            <hr class="my-4">

            <div class="text-center p-4 rounded-lg
                {% if student.grade == 'Distinction' %} bg-green-100 text-green-700 border border-green-500
                {% elif student.grade == 'First Class' %} bg-blue-100 text-blue-700 border border-blue-500
                {% elif student.grade == 'Second Class' %} bg-orange-100 text-orange-700 border border-orange-500
                {% else %} bg-red-100 text-red-700 border border-red-500
                {% endif %}">
                
                <p class="text-sm font-semibold uppercase tracking-widest">Grade</p>
                <p class="text-2xl font-black">{{ student.grade }}</p>
                <p class="text-sm font-bold">{{ student.status }}</p>
            </div>
        </div>

        <a href="{% url 'home' %}" class="mt-8 inline-block text-blue-600 hover:underline font-medium">
            ← Generate New Report
        </a>
    </div>

</body>
</html>
